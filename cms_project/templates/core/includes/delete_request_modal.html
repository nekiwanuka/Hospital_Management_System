<!-- Delete Request Modal — include with: object_type, object_id, object_label, next_url -->
<button type="button" class="btn btn-outline-danger btn-sm" data-bs-toggle="modal" data-bs-target="#deleteRequestModal">
    <i class="bi bi-trash3 me-1"></i>Request Delete
</button>

<div class="modal fade" id="deleteRequestModal" tabindex="-1" aria-labelledby="deleteRequestModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <form method="post" action="{% url 'core:request_delete' %}">
            {% csrf_token %}
            <input type="hidden" name="object_type" value="{{ delete_object_type }}">
            <input type="hidden" name="object_id" value="{{ delete_object_id }}">
            <input type="hidden" name="object_label" value="{{ delete_object_label }}">
            <input type="hidden" name="next" value="{{ delete_next_url }}">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="deleteRequestModalLabel"><i class="bi bi-trash3 me-2"></i>Request Deletion</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p>You are requesting deletion of <strong>{{ delete_object_type }} #{{ delete_object_id }}</strong>{% if delete_object_label %} ({{ delete_object_label }}){% endif %}.</p>
                    <div class="mb-3">
                        <label class="form-label fw-semibold" for="deleteReason">Reason <span class="text-danger">*</span></label>
                        <textarea class="form-control" name="reason" id="deleteReason" rows="3" required placeholder="Why should this record be deleted?"></textarea>
                    </div>
                    <div class="text-muted small">A director will review your request before any deletion occurs.</div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-danger">Submit Request</button>
                </div>
            </div>
        </form>
    </div>
</div>
