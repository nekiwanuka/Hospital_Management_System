{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login — {{ clinic_name|default:"ClinicMS" }}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body{font-family:'Inter',sans-serif;background:#f1f5f9;min-height:100vh;display:flex;align-items:center;justify-content:center}
    .login-card{max-width:420px;width:100%;background:#fff;border-radius:0.75rem;box-shadow:0 4px 6px -1px rgba(0,0,0,.1);padding:2.5rem}
    .login-brand{text-align:center;margin-bottom:2rem}
    .login-brand .icon{width:56px;height:56px;background:#0d6efd;border-radius:0.75rem;display:inline-flex;align-items:center;justify-content:center;color:#fff;font-size:1.5rem;margin-bottom:0.75rem}
    .login-brand h1{font-size:1.25rem;font-weight:700;margin:0}
    .login-brand p{color:#64748b;font-size:0.8125rem;margin:0.25rem 0 0}
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-brand">
      <div class="icon"><i class="bi bi-hospital"></i></div>
      <h1>{{ clinic_name|default:"ClinicMS" }}</h1>
      <p>Hospital Management System</p>
    </div>

    {% if form.errors %}
    <div class="alert alert-danger py-2" style="font-size:.8125rem">
      Invalid username or password. Please try again.
    </div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label for="id_username" class="form-label">Username</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person"></i></span>
          <input type="text" name="username" id="id_username" class="form-control" autofocus required>
        </div>
      </div>
      <div class="mb-3">
        <label for="id_password" class="form-label">Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" name="password" id="id_password" class="form-control" required>
        </div>
      </div>
      <button type="submit" class="btn btn-primary w-100">Sign In</button>
      {% if next %}<input type="hidden" name="next" value="{{ next }}">{% endif %}
    </form>
  </div>
</body>
</html>
